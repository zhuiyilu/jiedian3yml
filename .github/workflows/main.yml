name: 自动发现 + 聚合 + 测速 + 筛选最佳100
 
on:
  workflow_dispatch:
  schedule:
    - cron: '17 */8 * * *'
 
permissions:
  contents: write
 
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 35
 
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
 
      - name: 安装依赖
        run: |
          pip install --quiet --break-system-packages pyyaml || pip install --quiet pyyaml
 
      - name: 下载 mihomo
        run: |
          VER=$(curl -sf "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" \
                | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/' | head -1)
          [ -z "$VER" ] && VER="1.19.27"
          echo "mihomo 版本: v${VER}"
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/v${VER}/mihomo-linux-amd64-compatible-v${VER}.gz" \
               -O mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v
 
      - name: 自动发现 + 聚合 + 测速
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTRA_SUBS: ${{ secrets.EXTRA_SUBS }}
        run: |
          cat << 'EOF' > collect.py
          import os, base64, json, time, socket, asyncio, subprocess, datetime
          import urllib.request, urllib.parse
          import yaml
          from collections import defaultdict
          from urllib.parse import urlparse, unquote, parse_qs
          from concurrent.futures import ThreadPoolExecutor, as_completed
 
          # ================================================================
          # 参数
          # ================================================================
          REPO_MAX_AGE_DAYS      = 7    # 只要 N 天内有推送的仓库
          FILE_MAX_AGE_DAYS      = 3    # 只要 N 天内有更新的文件
          SEARCH_MAX_REPOS       = 60   # 最多发现多少个仓库
          SEARCH_MAX_FILES       = 120  # 最多下载多少个文件
          FILES_PER_REPO         = 5    # 每个仓库最多取多少文件
          SEARCH_API_DELAY       = 1.2  # API 请求间隔(秒)
 
          TCP_CONCURRENCY        = 500
          TCP_TIMEOUT            = 1.5
          HTTP_CANDIDATES        = 500
          HTTP_PER_SOURCE        = 40
          HTTP_CONCURRENCY       = 50
          HTTP_TIMEOUT_MS        = 5000
          TOP_N                  = 100
          MIHOMO_API             = "http://127.0.0.1:9090"
          MIHOMO_SECRET          = "AutoCollect2025"
 
          PREFIXES = ('vmess://', 'vless://', 'trojan://', 'ss://',
                      'hysteria2://', 'hy2://', 'tuic://')
 
          # ================================================================
          # 搜索策略（大范围撒网）
          # ================================================================
 
          # 仓库关键词搜索
          REPO_SEARCH_QUERIES = [
              '免费节点 clash vmess vless 订阅',
              '免费代理 节点订阅 clash yaml',
              'free proxy nodes clash subscription auto update',
              'clash free node subscription vmess vless trojan',
              'v2ray free nodes subscription auto',
              'proxy nodes clash yaml auto update daily',
              '科学上网 节点 clash 订阅 免费',
              '翻墙 免费节点 vmess vless trojan',
              'xray nodes free subscription clash',
              'sing-box free nodes subscription',
              'hysteria2 free nodes subscription',
              'shadowsocks free nodes clash subscription',
              'proxy scraper free nodes daily update',
              'clash provider free nodes auto collect',
          ]
 
          # 话题搜索（GitHub Topics）
          REPO_TOPICS = [
              # 协议类
              'clash', 'clash-config', 'clash-subscription', 'clash-meta',
              'v2ray', 'v2ray-config', 'v2ray-nodes',
              'xray', 'xray-config',
              'shadowsocks', 'shadowsocksr',
              'trojan', 'trojan-go',
              'hysteria', 'hysteria2',
              'sing-box',
              # 节点/代理类
              'free-node', 'free-nodes', 'free-proxy',
              'proxy-list', 'proxy-pool', 'proxy-scraper',
              'node-list', 'node-collector',
              'vpn', 'free-vpn',
              # 订阅类
              'subscription', 'sub-converter',
              # 翻墙相关
              'gfw', 'bypass-gfw', 'fanqiang',
              # 聚合类
              'aggregator', 'collector', 'crawler',
          ]
 
          # 在仓库里查找节点文件时的候选路径
          KNOWN_FILE_NAMES = [
              'sub.yaml', 'sub.yml', 'sub.txt',
              'clash.yaml', 'clash.yml',
              'config.yaml', 'nodes.yaml', 'proxy.yaml',
              'all.yaml', 'merged.yaml', 'output.yaml', 'result.yaml',
              'nodes.txt', 'proxy.txt', 'all.txt', 'subscribe.txt',
              'base64.txt', 'v2ray.txt', 'vmess.txt',
          ]
 
          KNOWN_FOLDERS = [
              '', 'clash', 'sub', 'config', 'nodes',
              'proxy', 'output', 'result', 'subscribe',
              'v2ray', 'xray', 'data', 'free',
          ]
 
          # ================================================================
          # 基础工具
          # ================================================================
 
          def utc_now():
              return datetime.datetime.now(datetime.timezone.utc)
 
          def days_ago(n):
              return (utc_now() - datetime.timedelta(days=n)).strftime('%Y-%m-%d')
 
          def parse_iso(s):
              try:
                  return datetime.datetime.fromisoformat(s.replace('Z', '+00:00'))
              except Exception:
                  return None
 
          def is_fresh(date_str, max_days):
              """日期字符串是否在 max_days 天以内"""
              if not date_str:
                  return True   # 获取不到就放行
              dt = parse_iso(date_str)
              if not dt:
                  return True
              return (utc_now() - dt).days <= max_days
 
          def gh_request(url, token, timeout=15):
              headers = {
                  'User-Agent': 'Mozilla/5.0',
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
              }
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.loads(r.read())
 
          def fetch_raw(url, timeout=30):
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      return r.read()
              except Exception:
                  return None
 
          def b64d(s):
              s = s.strip().replace('-', '+').replace('_', '/')
              return base64.b64decode(s + '=' * (-len(s) % 4))
 
          def decode_content(data):
              if not data:
                  return ''
              text = data.decode('utf-8', errors='ignore').strip()
              if '://' not in text[:200]:
                  try:
                      return base64.b64decode(text + '===').decode('utf-8')
                  except Exception:
                      pass
              return text
 
          # ================================================================
          # Clash YAML ↔ 节点链接
          # ================================================================
 
          def clash_to_link(px):
              try:
                  t = px.get('type', '').lower()
                  name_q = urllib.parse.quote(str(px.get('name', '')))
 
                  if t == 'vmess':
                      info = {
                          'v': '2', 'ps': px.get('name', ''),
                          'add': px['server'], 'port': str(px['port']),
                          'id': px.get('uuid', ''), 'aid': str(px.get('alterId', 0)),
                          'net': px.get('network', 'tcp'), 'type': 'none',
                          'tls': 'tls' if px.get('tls') else '',
                          'sni': px.get('servername', ''),
                      }
                      if px.get('network') == 'ws':
                          opts = px.get('ws-opts', {})
                          info['path'] = opts.get('path', '/')
                          info['host'] = (opts.get('headers') or {}).get('Host', '')
                      elif px.get('network') == 'grpc':
                          info['path'] = (px.get('grpc-opts') or {}).get('grpc-service-name', '')
                      return 'vmess://' + base64.b64encode(json.dumps(info).encode()).decode()
 
                  if t == 'vless':
                      params = {'encryption': 'none', 'type': px.get('network', 'tcp')}
                      sec = 'none'
                      if px.get('tls'): sec = 'tls'
                      ro = px.get('reality-opts', {})
                      if ro: sec = 'reality'
                      if sec != 'none': params['security'] = sec
                      if px.get('servername'): params['sni'] = px['servername']
                      if px.get('client-fingerprint'): params['fp'] = px['client-fingerprint']
                      if ro:
                          params['pbk'] = ro.get('public-key', '')
                          params['sid'] = ro.get('short-id', '')
                      if px.get('flow'): params['flow'] = px['flow']
                      if px.get('network') == 'ws':
                          opts = px.get('ws-opts', {})
                          params['path'] = opts.get('path', '/')
                          params['host'] = (opts.get('headers') or {}).get('Host', '')
                      elif px.get('network') == 'grpc':
                          params['serviceName'] = (px.get('grpc-opts') or {}).get('grpc-service-name', '')
                      q = urllib.parse.urlencode(params)
                      return f"vless://{px.get('uuid','')}@{px['server']}:{px['port']}?{q}#{name_q}"
 
                  if t == 'trojan':
                      params = {}
                      if px.get('sni'): params['sni'] = px['sni']
                      if px.get('skip-cert-verify'): params['allowInsecure'] = '1'
                      net = px.get('network', 'tcp')
                      if net != 'tcp':
                          params['type'] = net
                          if net == 'ws':
                              opts = px.get('ws-opts', {})
                              params['path'] = opts.get('path', '/')
                              params['host'] = (opts.get('headers') or {}).get('Host', '')
                      q = urllib.parse.urlencode(params)
                      return f"trojan://{px.get('password','')}@{px['server']}:{px['port']}?{q}#{name_q}"
 
                  if t == 'ss':
                      method, pwd = px.get('cipher', ''), px.get('password', '')
                      userinfo = base64.b64encode(f'{method}:{pwd}'.encode()).decode()
                      return f"ss://{userinfo}@{px['server']}:{px['port']}#{name_q}"
 
                  if t == 'hysteria2':
                      params = {}
                      if px.get('sni'): params['sni'] = px['sni']
                      if px.get('skip-cert-verify'): params['insecure'] = '1'
                      if px.get('obfs'): params['obfs'] = px['obfs']
                      if px.get('obfs-password'): params['obfs-password'] = px['obfs-password']
                      q = urllib.parse.urlencode(params)
                      return f"hysteria2://{px.get('password','')}@{px['server']}:{px['port']}?{q}#{name_q}"
 
                  if t == 'tuic':
                      params = {}
                      if px.get('sni'): params['sni'] = px['sni']
                      alpn = px.get('alpn', [])
                      if alpn: params['alpn'] = alpn[0]
                      if px.get('skip-cert-verify'): params['allow_insecure'] = '1'
                      q = urllib.parse.urlencode(params)
                      return (f"tuic://{px.get('uuid','')}:{px.get('password','')}@"
                              f"{px['server']}:{px['port']}?{q}#{name_q}")
              except Exception:
                  pass
              return None
 
          def _parse_clash_yaml(text):
              try:
                  data = yaml.safe_load(text)
                  if not isinstance(data, dict): return []
                  proxies = data.get('proxies') or data.get('Proxies') or []
                  if not isinstance(proxies, list): return []
                  return [l for l in (clash_to_link(px) for px in proxies) if l]
              except Exception:
                  return []
 
          def extract_nodes(content):
              if not content: return []
              stripped = content.lstrip()
              if any(stripped.startswith(k) for k in
                     ('proxies:', 'Proxies:', 'mixed-port:', 'port:', 'rules:')):
                  nodes = _parse_clash_yaml(content)
                  if nodes: return nodes
              nodes = [l.strip() for l in content.splitlines()
                       if l.strip() and any(l.strip().startswith(p) for p in PREFIXES)]
              if nodes: return nodes
              try:
                  decoded = b64d(content.strip()).decode('utf-8')
                  if any(decoded.lstrip().startswith(k) for k in ('proxies:', 'Proxies:')):
                      nodes = _parse_clash_yaml(decoded)
                      if nodes: return nodes
                  return [l.strip() for l in decoded.splitlines()
                          if l.strip() and any(l.strip().startswith(p) for p in PREFIXES)]
              except Exception:
                  pass
              return []
 
          # ================================================================
          # GitHub 自动发现（带活跃过滤）
          # ================================================================
 
          def search_repos(token, query, topic=False, per_page=10):
              """搜索仓库，只返回 REPO_MAX_AGE_DAYS 天内有推送的"""
              pushed_filter = f'+pushed:>{days_ago(REPO_MAX_AGE_DAYS)}'
              if topic:
                  q = f'topic:{query}+is:public{pushed_filter}'
              else:
                  q = f'{urllib.parse.quote(query)}+is:public{pushed_filter}'
              url = (f'https://api.github.com/search/repositories'
                     f'?q={q}&sort=updated&order=desc&per_page={per_page}')
              try:
                  data = gh_request(url, token)
                  return data.get('items', [])
              except Exception as e:
                  print(f"    搜索失败: {e}")
                  return []
 
          def get_file_commit_date(token, full_name, path):
              """获取文件最后一次 commit 的时间"""
              url = (f'https://api.github.com/repos/{full_name}/commits'
                     f'?path={urllib.parse.quote(path)}&per_page=1')
              try:
                  data = gh_request(url, token, timeout=10)
                  if data:
                      return data[0]['commit']['committer']['date']
              except Exception:
                  pass
              return None
 
          def list_contents(token, full_name, path=''):
              url = f'https://api.github.com/repos/{full_name}/contents/{path}'
              try:
                  return gh_request(url, token, timeout=10)
              except Exception:
                  return []
 
          def is_node_filename(name):
              n = name.lower()
              if not n.endswith(('.yaml', '.yml', '.txt')):
                  return False
              # 日期命名：2025-07-01.yaml / 20250701.yaml
              base = n.rsplit('.', 1)[0]
              if len(base) >= 8 and base[:4].isdigit():
                  return True
              keywords = ('sub', 'clash', 'node', 'proxy', 'config',
                          'merged', 'all', 'output', 'result', 'free',
                          'v2ray', 'vmess', 'vless', 'trojan', 'base64',
                          'subscribe', 'xray', 'hysteria', 'tuic')
              return any(k in n for k in keywords)
 
          def find_node_files_in_repo(token, repo):
              """扫描仓库，找近期更新的节点文件"""
              full_name = repo['full_name']
              result = []   # [(download_url, label, file_date)]
 
              root_items = list_contents(token, full_name, '')
              time.sleep(0.3)
              if not isinstance(root_items, list):
                  return result
 
              root_files = {it['name'].lower(): it for it in root_items if it['type'] == 'file'}
              root_dirs  = {it['name'].lower(): it for it in root_items if it['type'] == 'dir'}
 
              def add_file(item, folder=''):
                  # 用 commit API 验证文件最后更新时间
                  file_date = get_file_commit_date(token, full_name, item['path'])
                  time.sleep(0.3)
                  if not is_fresh(file_date, FILE_MAX_AGE_DAYS):
                      return   # 文件太久没更新，跳过
                  label = f"github:{full_name}/{item['name']}"
                  result.append((item['download_url'], label))
 
              # 扫描根目录文件（日期命名优先）
              candidates = sorted(
                  [it for n, it in root_files.items() if is_node_filename(n)],
                  key=lambda x: x['name'], reverse=True
              )
              for it in candidates[:FILES_PER_REPO]:
                  if len(result) >= FILES_PER_REPO: break
                  add_file(it)
 
              # 扫描常见子目录
              for dname in KNOWN_FOLDERS[1:]:
                  if len(result) >= FILES_PER_REPO: break
                  if dname not in root_dirs: continue
                  sub_items = list_contents(token, full_name, root_dirs[dname]['name'])
                  time.sleep(0.3)
                  if not isinstance(sub_items, list): continue
                  yaml_files = sorted(
                      [it for it in sub_items
                       if it['type'] == 'file' and is_node_filename(it['name'])],
                      key=lambda x: x['name'], reverse=True
                  )
                  for it in yaml_files[:3]:
                      if len(result) >= FILES_PER_REPO: break
                      add_file(it)
 
              return result
 
          def discover_all_sources(token, my_repo):
              if not token:
                  print("⚠️  未检测到 GITHUB_TOKEN，跳过 GitHub 自动发现")
                  return {}
 
              print(f"🔍 开始 GitHub 自动发现（只收录 {REPO_MAX_AGE_DAYS} 天内活跃仓库）\n")
 
              repo_map = {}
 
              def add_repos(items, source=''):
                  added = 0
                  for r in items:
                      fn = r['full_name']
                      if fn == my_repo or fn in repo_map: continue
                      if len(repo_map) >= SEARCH_MAX_REPOS: break
                      repo_map[fn] = {
                          'full_name': fn,
                          'default_branch': r.get('default_branch', 'main'),
                          'stars': r.get('stargazers_count', 0),
                          'pushed_at': r.get('pushed_at', ''),
                      }
                      added += 1
                  return added
 
              # 关键词搜索
              print(f"  [1/2] 关键词搜索（{len(REPO_SEARCH_QUERIES)} 个查询）...")
              for q in REPO_SEARCH_QUERIES:
                  if len(repo_map) >= SEARCH_MAX_REPOS: break
                  items = search_repos(token, q, topic=False, per_page=8)
                  n = add_repos(items)
                  print(f"    +{n:2d}  \"{q[:40]}\"")
                  time.sleep(SEARCH_API_DELAY)
 
              # 话题搜索
              print(f"\n  [2/2] 话题搜索（{len(REPO_TOPICS)} 个话题）...")
              for topic in REPO_TOPICS:
                  if len(repo_map) >= SEARCH_MAX_REPOS: break
                  items = search_repos(token, topic, topic=True, per_page=8)
                  n = add_repos(items)
                  print(f"    +{n:2d}  topic:{topic}")
                  time.sleep(SEARCH_API_DELAY)
 
              # 按 star + 推送时间排序
              repos = sorted(repo_map.values(),
                             key=lambda x: (x['stars'], x['pushed_at']),
                             reverse=True)
              print(f"\n  共发现 {len(repos)} 个近期活跃仓库，扫描节点文件...\n")
 
              all_sources = {}
              for repo in repos:
                  if len(all_sources) >= SEARCH_MAX_FILES: break
                  fn = repo['full_name']
                  files = find_node_files_in_repo(token, repo)
                  if files:
                      print(f"  ✓ {fn} (⭐{repo['stars']}) → {len(files)} 个近期文件")
                      for url, label in files:
                          if url and url not in all_sources:
                              all_sources[url] = label
                  else:
                      print(f"  - {fn} → 无近期节点文件")
                  time.sleep(SEARCH_API_DELAY)
 
              print(f"\n✅ 发现 {len(all_sources)} 个有效节点文件\n")
              return all_sources
 
          # ================================================================
          # host:port 解析
          # ================================================================
 
          def get_host_port(link):
              try:
                  if link.startswith('vmess://'):
                      info = json.loads(b64d(link[8:]).decode('utf-8', errors='ignore'))
                      return info.get('add'), int(info.get('port'))
                  p = urlparse(link)
                  if p.hostname and p.port: return p.hostname, p.port
                  if link.startswith('ss://'):
                      body = link[5:].split('#')[0]
                      dec = b64d(body).decode('utf-8', errors='ignore')
                      if '@' in dec:
                          h, port = dec.rsplit('@', 1)[1].split(':')
                          return h, int(port)
              except Exception:
                  pass
              return None, None
 
          # ================================================================
          # Stage 1: asyncio TCP ping
          # ================================================================
 
          async def tcp_ping(host, port, sem):
              async with sem:
                  try:
                      t0 = time.monotonic()
                      r, w = await asyncio.wait_for(
                          asyncio.open_connection(host, port), timeout=TCP_TIMEOUT)
                      delay = round((time.monotonic() - t0) * 1000, 1)
                      w.close()
                      try: await w.wait_closed()
                      except Exception: pass
                      return delay
                  except Exception:
                      return None
 
          async def run_tcp_stage(server_list):
              sem = asyncio.Semaphore(TCP_CONCURRENCY)
              tasks = [tcp_ping(h, p, sem) for h, p in server_list]
              results = []
              CHUNK = 1000
              done = 0
              for i in range(0, len(tasks), CHUNK):
                  batch = await asyncio.gather(*tasks[i:i+CHUNK])
                  results.extend(batch)
                  done += len(batch)
                  alive = sum(1 for x in results if x is not None)
                  print(f"  进度 {done}/{len(tasks)}，存活 {alive}")
              return results
 
          # ================================================================
          # Stage 2: mihomo HTTP 测速
          # ================================================================
 
          def mihomo_delay(name):
              encoded = urllib.parse.quote(name, safe='')
              url = (f"{MIHOMO_API}/proxies/{encoded}/delay"
                     f"?url=http://cp.cloudflare.com/generate_204"
                     f"&timeout={HTTP_TIMEOUT_MS}")
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {MIHOMO_SECRET}')
              try:
                  with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT_MS/1000 + 3) as r:
                      return json.loads(r.read()).get('delay')
              except Exception:
                  return None
 
          def run_http_stage(proxy_names):
              results = {}
              done, total = 0, len(proxy_names)
              with ThreadPoolExecutor(max_workers=HTTP_CONCURRENCY) as pool:
                  futures = {pool.submit(mihomo_delay, n): n for n in proxy_names}
                  for fut in as_completed(futures):
                      name = futures[fut]
                      results[name] = fut.result()
                      done += 1
                      if done % 50 == 0 or done == total:
                          ok = sum(1 for v in results.values() if v)
                          print(f"  进度 {done}/{total}，可用 {ok}")
              return results
 
          # ================================================================
          # 节点链接 → Clash 代理字典
          # ================================================================
 
          def safe_name(raw, used):
              name = (raw or '').strip() or '节点'
              base, i = name, 2
              while name in used:
                  name = f'{base}-{i}'; i += 1
              used.add(name)
              return name
 
          def pqs(link):
              p = urlparse(link)
              q = {k: v[0] for k, v in parse_qs(p.query).items()}
              return p, q, unquote(p.fragment)
 
          def vmess_proxy(link, used):
              try:
                  info = json.loads(b64d(link[8:]).decode('utf-8', errors='ignore'))
                  name = safe_name(unquote(str(info.get('ps', 'vmess'))), used)
                  px = {'name': name, 'type': 'vmess',
                        'server': info['add'], 'port': int(info['port']),
                        'uuid': info['id'], 'alterId': int(info.get('aid', 0) or 0),
                        'cipher': info.get('scy') or 'auto', 'udp': True}
                  net = info.get('net', 'tcp')
                  if net != 'tcp': px['network'] = net
                  if info.get('tls') in ('tls', 'reality'):
                      px['tls'] = True
                      if info.get('sni'): px['servername'] = info['sni']
                  if net == 'ws':
                      px['ws-opts'] = {'path': info.get('path') or '/',
                                       'headers': {'Host': info['host']} if info.get('host') else {}}
                  elif net == 'grpc':
                      px['grpc-opts'] = {'grpc-service-name': info.get('path') or ''}
                  return px
              except Exception: return None
 
          def vless_proxy(link, used):
              try:
                  p, q, frag = pqs(link)
                  if not (p.hostname and p.port and p.username): return None
                  name = safe_name(frag or 'vless', used)
                  px = {'name': name, 'type': 'vless', 'server': p.hostname,
                        'port': p.port, 'uuid': p.username, 'udp': True}
                  net = q.get('type', 'tcp')
                  if net != 'tcp': px['network'] = net
                  sec = q.get('security', 'none')
                  if sec in ('tls', 'reality'):
                      px['tls'] = True
                      if q.get('sni'): px['servername'] = q['sni']
                      if q.get('fp'):  px['client-fingerprint'] = q['fp']
                      if sec == 'reality':
                          px['reality-opts'] = {'public-key': q.get('pbk', ''), 'short-id': q.get('sid', '')}
                  if q.get('flow'): px['flow'] = q['flow']
                  if net == 'ws':
                      px['ws-opts'] = {'path': unquote(q.get('path', '/')),
                                       'headers': {'Host': q['host']} if q.get('host') else {}}
                  elif net == 'grpc':
                      px['grpc-opts'] = {'grpc-service-name': q.get('serviceName', '')}
                  return px
              except Exception: return None
 
          def trojan_proxy(link, used):
              try:
                  p, q, frag = pqs(link)
                  if not (p.hostname and p.port and p.username): return None
                  name = safe_name(frag or 'trojan', used)
                  px = {'name': name, 'type': 'trojan', 'server': p.hostname,
                        'port': p.port, 'password': p.username, 'udp': True}
                  sni = q.get('sni') or q.get('peer')
                  if sni: px['sni'] = sni
                  if q.get('allowInsecure') == '1' or q.get('insecure') == '1':
                      px['skip-cert-verify'] = True
                  net = q.get('type', 'tcp')
                  if net == 'ws':
                      px['network'] = 'ws'
                      px['ws-opts'] = {'path': unquote(q.get('path', '/')),
                                       'headers': {'Host': q['host']} if q.get('host') else {}}
                  elif net == 'grpc':
                      px['network'] = 'grpc'
                      px['grpc-opts'] = {'grpc-service-name': q.get('serviceName', '')}
                  return px
              except Exception: return None
 
          # clash/mihomo 支持的合法 SS 加密方式白名单
          VALID_SS_CIPHERS = {
              'aes-128-gcm', 'aes-192-gcm', 'aes-256-gcm',
              'aes-128-cfb', 'aes-192-cfb', 'aes-256-cfb',
              'aes-128-ctr', 'aes-192-ctr', 'aes-256-ctr',
              'chacha20-ietf-poly1305', 'xchacha20-ietf-poly1305',
              'chacha20', 'chacha20-ietf', 'xchacha20',
              'rc4-md5', 'none',
              '2022-blake3-aes-128-gcm', '2022-blake3-aes-256-gcm',
              '2022-blake3-chacha20-poly1305',
          }
 
          # 一些节点提供方会用旧版/非标准别名命名 cipher，
          # clash 内核并不认识这些别名，需要先转换成标准名称再校验
          CIPHER_ALIASES = {
              'chacha20-poly1305': 'chacha20-ietf-poly1305',
              'chacha20poly1305': 'chacha20-ietf-poly1305',
              'aead_chacha20_poly1305': 'chacha20-ietf-poly1305',
              'xchacha20-poly1305': 'xchacha20-ietf-poly1305',
              'aead_xchacha20_poly1305': 'xchacha20-ietf-poly1305',
              'aead_aes_128_gcm': 'aes-128-gcm',
              'aead_aes_256_gcm': 'aes-256-gcm',
          }
 
          def ss_proxy(link, used):
              try:
                  p, q, frag = pqs(link)
                  method = password = None
                  host, port = p.hostname, p.port
                  if p.username and host and port:
                      try:
                          ui = b64d(unquote(p.username)).decode('utf-8')
                          method, password = ui.split(':', 1)
                      except Exception:
                          if ':' in unquote(p.username):
                              method, password = unquote(p.username).split(':', 1)
                  if not (method and password and host and port):
                      body = link[5:].split('#')[0]
                      dec = b64d(body).decode('utf-8')
                      mp, hp = dec.rsplit('@', 1)
                      method, password = mp.split(':', 1)
                      host, port = hp.split(':'); port = int(port)
                  method = (method or '').strip().lower()
                  method = CIPHER_ALIASES.get(method, method)  # 别名 → 标准名称
                  # 加密方式非法/解析出乱码 → 直接丢弃该节点，避免污染整份订阅
                  if method not in VALID_SS_CIPHERS:
                      return None
                  name = safe_name(frag or 'ss', used)
                  return {'name': name, 'type': 'ss', 'server': host, 'port': int(port),
                          'cipher': method, 'password': password, 'udp': True}
              except Exception: return None
 
          def hy2_proxy(link, used):
              try:
                  p, q, frag = pqs(link)
                  if not (p.hostname and p.port): return None
                  name = safe_name(frag or 'hy2', used)
                  px = {'name': name, 'type': 'hysteria2', 'server': p.hostname, 'port': p.port,
                        'password': unquote(p.username) if p.username else q.get('auth', ''),
                        'udp': True}
                  sni = q.get('sni') or q.get('peer')
                  if sni: px['sni'] = sni
                  if q.get('insecure') == '1': px['skip-cert-verify'] = True
                  # 只有 obfs 类型和 obfs-password 都非空时才写入，
                  # 否则 clash 内核会因为 "obfs 已启用但密码为空" 而校验失败
                  obfs_type = (q.get('obfs') or '').strip()
                  obfs_pwd  = (q.get('obfs-password') or '').strip()
                  if obfs_type and obfs_type.lower() != 'none' and obfs_pwd:
                      px['obfs'] = obfs_type
                      px['obfs-password'] = obfs_pwd
                  return px
              except Exception: return None
 
          def tuic_proxy(link, used):
              try:
                  p, q, frag = pqs(link)
                  if not (p.hostname and p.port): return None
                  name = safe_name(frag or 'tuic', used)
                  px = {'name': name, 'type': 'tuic', 'server': p.hostname, 'port': p.port, 'udp': True}
                  if p.username and p.password:
                      px['uuid'], px['password'] = p.username, p.password
                  else:
                      px['uuid'] = p.username or q.get('uuid', '')
                      px['password'] = q.get('password', '')
                  if q.get('sni'):  px['sni'] = q['sni']
                  if q.get('alpn'): px['alpn'] = [q['alpn']]
                  if q.get('allow_insecure') == '1': px['skip-cert-verify'] = True
                  return px
              except Exception: return None
 
          def to_clash(link, used):
              if link.startswith('vmess://'): return vmess_proxy(link, used)
              if link.startswith('vless://'): return vless_proxy(link, used)
              if link.startswith('trojan://'): return trojan_proxy(link, used)
              if link.startswith('ss://'): return ss_proxy(link, used)
              if link.startswith('hysteria2://') or link.startswith('hy2://'): return hy2_proxy(link, used)
              if link.startswith('tuic://'): return tuic_proxy(link, used)
              return None
 
          # ================================================================
          # 配置自愈校验：用 mihomo 内核本身测试最终配置，
          # 自动定位并剔除任何导致校验失败的节点，直到配置完全合法
          # ================================================================
 
          import re as _re
 
          def validate_and_clean_proxies(proxies, max_rounds=None):
              """
              用真实的 mihomo -t 测试配置。
              如果报错指出了具体的第 N 个 proxy 有问题，就把它剔除后重新测试，
              循环直到配置通过校验，或者没有更多可剔除的节点为止。
              这样无论以后遇到什么协议/字段的新怪问题，都能在生成阶段自动兜底，
              而不需要针对每一种坏值手动加白名单。
              """
              proxies = list(proxies)
              if max_rounds is None:
                  max_rounds = len(proxies) + 5
 
              test_dir = 'mihomo_selftest'
              os.makedirs(test_dir, exist_ok=True)
 
              for round_i in range(max_rounds):
                  if not proxies:
                      break
                  cfg = {
                      'mixed-port': 7891,
                      'log-level': 'silent',
                      'mode': 'rule',
                      'ipv6': False,
                      'proxies': proxies,
                      'proxy-groups': [],
                      'rules': ['MATCH,DIRECT'],
                  }
                  with open(os.path.join(test_dir, 'config.yaml'), 'w', encoding='utf-8') as f:
                      yaml.dump(cfg, f, allow_unicode=True, sort_keys=False)
 
                  try:
                      result = subprocess.run(
                          ['./mihomo', '-t', '-d', test_dir],
                          capture_output=True, text=True, timeout=30
                      )
                  except Exception as e:
                      print(f"  ⚠️ 自检执行失败，跳过自愈校验: {e}")
                      break
 
                  output = (result.stdout or '') + '\n' + (result.stderr or '')
 
                  if result.returncode == 0:
                      print(f"  ✅ 配置自检通过（共尝试 {round_i+1} 轮，剩余 {len(proxies)} 个节点）")
                      return proxies
 
                  # 尝试从报错里提取出问题节点的序号，例如 "proxy 8: ..."
                  m = _re.search(r'proxy\s+(\d+)\s*:', output)
                  if not m:
                      print(f"  ⚠️ 配置校验失败，但无法定位具体节点，停止自愈：\n{output[:500]}")
                      break
 
                  bad_idx = int(m.group(1)) - 1   # 报错里通常是 1-based
                  if 0 <= bad_idx < len(proxies):
                      bad_name = proxies[bad_idx].get('name', '未知')
                      print(f"  🗑️  剔除第 {bad_idx+1} 个非法节点: {bad_name}")
                      proxies.pop(bad_idx)
                  else:
                      print(f"  ⚠️ 报错索引 {bad_idx+1} 超出范围，停止自愈")
                      break
              else:
                  print(f"  ⚠️ 自愈校验达到最大轮数仍未通过，使用当前剩余 {len(proxies)} 个节点")
 
              return proxies
 
 
          def main():
              token   = os.getenv('GITHUB_TOKEN', '')
              my_repo = os.getenv('GITHUB_REPOSITORY', '')
              extra   = os.getenv('EXTRA_SUBS', '')
 
              # 1. GitHub 自动发现
              github_sources = discover_all_sources(token, my_repo)
 
              # 2. 手动补充订阅（可选，配置在 EXTRA_SUBS secret 里）
              extra_sources = {}
              for u in extra.splitlines():
                  u = u.strip()
                  if u: extra_sources[u] = '手动订阅'
 
              all_sources = {**github_sources, **extra_sources}
              print(f"📦 总来源: {len(github_sources)} GitHub自动 + "
                    f"{len(extra_sources)} 手动 = {len(all_sources)} 个\n")
 
              if not all_sources:
                  print("❌ 没有找到任何来源，退出")
                  return
 
              # 3. 并发下载
              print("⬇️  并发下载节点文件...")
              url_list = list(all_sources.keys())
              with ThreadPoolExecutor(max_workers=min(30, len(url_list))) as pool:
                  raws = list(pool.map(fetch_raw, url_list))
 
              # 4. 解析节点
              seen_links = {}
              src_counts = defaultdict(int)
              for url, raw in zip(url_list, raws):
                  if not raw: continue
                  label = all_sources[url]
                  nodes = extract_nodes(decode_content(raw))
                  src_counts[label] += len(nodes)
                  for n in nodes:
                      if n not in seen_links:
                          seen_links[n] = label
 
              unique_nodes = list(seen_links.keys())
              print(f"\n✅ 去重后共 {len(unique_nodes)} 个节点，来自 {len(src_counts)} 个来源")
              print("Top 来源：")
              for label, cnt in sorted(src_counts.items(), key=lambda x: -x[1])[:15]:
                  print(f"  {cnt:6d} 个 ← {label}")
 
              if not unique_nodes:
                  print("❌ 没有获取到节点，退出"); return
 
              # 5. 按 host:port 分组
              server_to_links = {}
              for link in unique_nodes:
                  h, p = get_host_port(link)
                  if not h or not p: continue
                  key = (h.lower(), p)
                  server_to_links.setdefault(key, []).append(link)
 
              all_servers = list(server_to_links.keys())
              print(f"\n唯一服务器: {len(all_servers)} 个")
 
              # 6. Stage 1: TCP ping
              print(f"\n🔌 Stage 1 TCP ping（{len(all_servers)} 个服务器）...")
              t0 = time.time()
              delays = asyncio.run(run_tcp_stage(all_servers))
              print(f"   用时 {round(time.time()-t0, 1)}s")
              alive = [(all_servers[i], delays[i])
                       for i in range(len(all_servers)) if delays[i] is not None]
              alive.sort(key=lambda x: x[1])
              print(f"✅ TCP 存活: {len(alive)}/{len(all_servers)}")
 
              # 7. 公平采样
              sub_buckets = defaultdict(list)
              for server_key, _ in alive:
                  for link in server_to_links[server_key]:
                      sub_buckets[seen_links.get(link, 'unknown')].append(link)
                      break
 
              tcp_candidates = []
              seen_c = set()
              sub_iters = {s: iter(l) for s, l in sub_buckets.items()}
              sub_counts2 = defaultdict(int)
              while len(tcp_candidates) < HTTP_CANDIDATES and sub_iters:
                  exhausted = []
                  for src in list(sub_iters.keys()):
                      if len(tcp_candidates) >= HTTP_CANDIDATES: break
                      if sub_counts2[src] >= HTTP_PER_SOURCE:
                          exhausted.append(src); continue
                      try:
                          link = next(sub_iters[src])
                          if link not in seen_c:
                              tcp_candidates.append(link)
                              seen_c.add(link)
                              sub_counts2[src] += 1
                      except StopIteration:
                          exhausted.append(src)
                  for src in exhausted: sub_iters.pop(src, None)
                  if not sub_iters: break
 
              print(f"\n公平采样: {len(tcp_candidates)} 个 HTTP 候选"
                    f"（来自 {len(sub_counts2)} 个来源，每源最多 {HTTP_PER_SOURCE} 个）")
 
              # 8. Stage 2: mihomo HTTP 测速
              print(f"\n🌐 Stage 2 真实 HTTP 测速（{len(tcp_candidates)} 个节点）...")
              used_names = set()
              name_to_link = {}
              clash_proxies = []
              for link in tcp_candidates:
                  px = to_clash(link, used_names)
                  if px:
                      name_to_link[px['name']] = link
                      clash_proxies.append(px)
 
              os.makedirs('mihomo_home', exist_ok=True)
              with open('mihomo_home/config.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump({
                      'mixed-port': 7888, 'external-controller': '127.0.0.1:9090',
                      'secret': MIHOMO_SECRET, 'log-level': 'silent',
                      'mode': 'direct', 'ipv6': False, 'geo-auto-update': False,
                      'proxies': clash_proxies, 'proxy-groups': [], 'rules': [],
                  }, f, allow_unicode=True, sort_keys=False)
 
              proc = subprocess.Popen(['./mihomo', '-d', 'mihomo_home'],
                                       stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
              ready = False
              for _ in range(40):
                  try:
                      s = socket.create_connection(('127.0.0.1', 9090), timeout=0.5)
                      s.close(); ready = True; break
                  except Exception:
                      time.sleep(0.3)
 
              best_links = []
              if not ready:
                  print("⚠️  mihomo 启动超时，降级使用 TCP 结果")
                  best_links = tcp_candidates[:TOP_N]
              else:
                  time.sleep(0.5)
                  t0 = time.time()
                  http_results = run_http_stage(list(name_to_link.keys()))
                  print(f"   用时 {round(time.time()-t0, 1)}s")
                  proc.terminate()
                  ok = sorted([(n, d) for n, d in http_results.items() if d],
                               key=lambda x: x[1])
                  print(f"✅ HTTP 可用: {len(ok)}/{len(clash_proxies)}")
                  best_links = [name_to_link[n] for n, _ in ok[:TOP_N]]
                  if len(best_links) < TOP_N:
                      tested = set(best_links)
                      for link in tcp_candidates + unique_nodes:
                          if len(best_links) >= TOP_N: break
                          if link not in tested:
                              best_links.append(link); tested.add(link)
 
              # 9. 转换为 Clash 格式，并做自愈校验（剔除任何导致校验失败的节点）
              used2 = set()
              proxies_out = []
              name_to_link_final = {}
              for l in best_links:
                  px = to_clash(l, used2)
                  if px:
                      proxies_out.append(px)
                      name_to_link_final[px['name']] = l
 
              print(f"\n🔍 对最终 {len(proxies_out)} 个节点做配置自愈校验...")
              proxies_out = validate_and_clean_proxies(proxies_out)
 
              # 根据自愈校验后剩余的节点，重新对齐原始链接顺序，
              # 保证 sub.txt / sub_plain.txt / sub.yaml 三个文件内容完全一致
              kept_names = [p['name'] for p in proxies_out]
              final_links = [name_to_link_final[n] for n in kept_names
                             if n in name_to_link_final]
 
              combined = '\n'.join(final_links)
              with open('sub.txt', 'w') as f:
                  f.write(base64.b64encode(combined.encode()).decode())
              with open('sub_plain.txt', 'w') as f:
                  f.write(combined)
 
              names_out = kept_names
              with open('sub.yaml', 'w', encoding='utf-8') as f:
                  yaml.dump({
                      'mixed-port': 7890, 'allow-lan': False,
                      'mode': 'rule', 'log-level': 'info',
                      'proxies': proxies_out,
                      'proxy-groups': [
                          {'name': '🚀 节点选择', 'type': 'select',
                           'proxies': ['♻️ 自动选择', 'DIRECT'] + names_out},
                          {'name': '♻️ 自动选择', 'type': 'url-test',
                           'url': 'https://www.gstatic.com/generate_204',
                           'interval': 300, 'proxies': names_out},
                      ],
                      'rules': ['MATCH,🚀 节点选择'],
                  }, f, allow_unicode=True, sort_keys=False)
 
              print(f"\n✅ 最终输出 {len(final_links)} 个节点"
                    f"（{len(proxies_out)} 个转换为 Clash 格式，已通过内核自检）")
              print("订阅文件：sub.txt / sub_plain.txt / sub.yaml")
 
          if __name__ == '__main__':
              main()
          EOF
 
          python3 collect.py
 
